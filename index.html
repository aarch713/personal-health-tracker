<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Health Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1f2937;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }
        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #10b981;
            border-bottom-color: #10b981;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
            border: 1px solid #a7f3d0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .stat-card h3 {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .stat-card .value {
            color: #10b981;
            font-size: 32px;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #f9fafb;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            color: #6b7280;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 13px;
        }
        tr:hover {
            background: #f9fafb;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-normal {
            background: #ecfdf5;
            color: #10b981;
        }
        .status-low {
            background: #fef2f2;
            color: #ef4444;
        }
        .status-high {
            background: #fef2f2;
            color: #ef4444;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .message.success {
            background: #ecfdf5;
            color: #10b981;
            border: 1px solid #a7f3d0;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        .category-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            border-left: 4px solid #10b981;
        }
        .category-section h3 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Personal Health Tracker</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="switchTab(event, 'results')">Lab Results</button>
            <button class="tab-btn" onclick="switchTab(event, 'entry')">Add Entry</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Tests</h3>
                    <div class="value" id="totalTests">0</div>
                </div>
                <div class="stat-card">
                    <h3>Normal Results</h3>
                    <div class="value" id="normalCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Abnormal Results</h3>
                    <div class="value" id="abnormalCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Latest Date</h3>
                    <div class="value" id="latestDate" style="font-size: 16px;">-</div>
                </div>
            </div>
            <div id="dashboardContent"></div>
        </div>

        <!-- Results Tab -->
        <div id="results" class="tab-content">
            <div id="resultsContent"></div>
        </div>

        <!-- Data Entry Tab -->
        <div id="entry" class="tab-content">
            <h2 style="margin-bottom: 20px; font-size: 18px; color: #1f2937;">Add New Lab Result</h2>
            <div id="entryMessage"></div>
            <form onsubmit="addEntry(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" id="entryDate" required>
                    </div>
                    <div class="form-group">
                        <label>Test Code *</label>
                        <input type="text" id="entryCode" placeholder="e.g., GLU, HGB" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Result Value *</label>
                        <input type="number" id="entryResult" step="0.01" placeholder="e.g., 5.2" required>
                    </div>
                    <div class="form-group">
                        <label>Unit</label>
                        <input type="text" id="entryUnit" placeholder="e.g., mmol/L">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Reference Low</label>
                        <input type="number" id="entryRefLow" step="0.01" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label>Reference High</label>
                        <input type="number" id="entryRefHigh" step="0.01" placeholder="Optional">
                    </div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save Entry</button>
                    <button type="button" class="btn btn-secondary" onclick="clearEntryForm()">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample data - hardcoded
        let data = {
            labResults: [
                {date: "2026-02-01", testCode: "GLU", result: 5.2, unit: "mmol/L", refLow: 3.9, refHigh: 6.1},
                {date: "2026-02-01", testCode: "HGB", result: 13.5, unit: "g/dL", refLow: 13.5, refHigh: 17.5},
                {date: "2026-02-01", testCode: "WBC", result: 7.2, unit: "10^9/L", refLow: 3.5, refHigh: 9.5},
                {date: "2026-02-01", testCode: "ALT", result: 28, unit: "U/L", refLow: 7, refHigh: 56},
                {date: "2026-02-01", testCode: "Cr", result: 0.85, unit: "mg/dL", refLow: 0.6, refHigh: 1.2},
                {date: "2026-02-03", testCode: "GLU", result: 5.5, unit: "mmol/L", refLow: 3.9, refHigh: 6.1},
                {date: "2026-02-03", testCode: "HGB", result: 13.2, unit: "g/dL", refLow: 13.5, refHigh: 17.5},
                {date: "2026-02-03", testCode: "WBC", result: 11.6, unit: "10^9/L", refLow: 3.5, refHigh: 9.5},
                {date: "2026-02-03", testCode: "ALT", result: 35, unit: "U/L", refLow: 7, refHigh: 56},
                {date: "2026-02-03", testCode: "Cr", result: 0.92, unit: "mg/dL", refLow: 0.6, refHigh: 1.2},
                {date: "2026-02-05", testCode: "GLU", result: 5.1, unit: "mmol/L", refLow: 3.9, refHigh: 6.1},
                {date: "2026-02-05", testCode: "HGB", result: 13.8, unit: "g/dL", refLow: 13.5, refHigh: 17.5},
                {date: "2026-02-05", testCode: "WBC", result: 8.1, unit: "10^9/L", refLow: 3.5, refHigh: 9.5},
                {date: "2026-02-05", testCode: "ALT", result: 32, unit: "U/L", refLow: 7, refHigh: 56},
                {date: "2026-02-05", testCode: "Cr", result: 0.88, unit: "mg/dL", refLow: 0.6, refHigh: 1.2},
            ]
        };

        function switchTab(event, tabName) {
            event.preventDefault();
            
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'results') {
                updateResultsTab();
            } else if (tabName === 'dashboard') {
                updateDashboard();
            } else if (tabName === 'entry') {
                setTodayDate();
            }
        }

        function updateDashboard() {
            const total = data.labResults.length;
            const normal = data.labResults.filter(r => !isAbnormal(r)).length;
            const abnormal = total - normal;
            const dates = data.labResults.map(r => r.date).filter(Boolean);
            const latest = dates.length > 0 ? dates[dates.length - 1] : '-';

            document.getElementById('totalTests').textContent = total;
            document.getElementById('normalCount').textContent = normal;
            document.getElementById('abnormalCount').textContent = abnormal;
            document.getElementById('latestDate').textContent = latest;

            if (total === 0) {
                document.getElementById('dashboardContent').innerHTML = '<div class="no-data">📊 No data available.</div>';
            } else {
                const uniqueDates = new Set(dates).size;
                document.getElementById('dashboardContent').innerHTML = `
                    <p style="color: #6b7280; font-size: 13px; margin-top: 20px;">
                        📈 Showing ${total} test results from ${uniqueDates} unique dates
                    </p>
                `;
            }
        }

        function updateResultsTab() {
            if (data.labResults.length === 0) {
                document.getElementById('resultsContent').innerHTML = '<div class="no-data">📋 No results to display.</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Test Code</th>
                            <th>Result</th>
                            <th>Unit</th>
                            <th>Ref Range</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.labResults.forEach(result => {
                const status = getStatus(result);
                const statusClass = status === 'Normal' ? 'status-normal' : 'status-low';
                html += `
                    <tr>
                        <td>${result.date || '-'}</td>
                        <td><strong>${result.testCode || '-'}</strong></td>
                        <td>${result.result || '-'}</td>
                        <td>${result.unit || '-'}</td>
                        <td>${result.refLow || '-'} - ${result.refHigh || '-'}</td>
                        <td><span class="status-badge ${statusClass}">${status}</span></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById('resultsContent').innerHTML = html;
        }

        function isAbnormal(result) {
            const val = parseFloat(result.result);
            const low = parseFloat(result.refLow);
            const high = parseFloat(result.refHigh);
            
            if (isNaN(val)) return false;
            if (!isNaN(low) && val < low) return true;
            if (!isNaN(high) && val > high) return true;
            return false;
        }

        function getStatus(result) {
            const val = parseFloat(result.result);
            const low = parseFloat(result.refLow);
            const high = parseFloat(result.refHigh);
            
            if (isNaN(val)) return 'Unknown';
            if (!isNaN(low) && val < low) return 'Low';
            if (!isNaN(high) && val > high) return 'High';
            return 'Normal';
        }

        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('entryDate').value = today;
        }

        function addEntry(event) {
            event.preventDefault();
            
            const date = document.getElementById('entryDate').value;
            const testCode = document.getElementById('entryCode').value;
            const result = parseFloat(document.getElementById('entryResult').value);
            const unit = document.getElementById('entryUnit').value;
            const refLow = document.getElementById('entryRefLow').value ? parseFloat(document.getElementById('entryRefLow').value) : null;
            const refHigh = document.getElementById('entryRefHigh').value ? parseFloat(document.getElementById('entryRefHigh').value) : null;

            if (!date || !testCode || isNaN(result)) {
                showMessage('Please fill in all required fields', 'error', 'entry');
                return;
            }

            data.labResults.push({
                date: date,
                testCode: testCode,
                result: result,
                unit: unit,
                refLow: refLow,
                refHigh: refHigh
            });

            showMessage('✅ Entry added successfully!', 'success', 'entry');
            clearEntryForm();
            updateDashboard();
        }

        function clearEntryForm() {
            document.getElementById('entryDate').value = '';
            document.getElementById('entryCode').value = '';
            document.getElementById('entryResult').value = '';
            document.getElementById('entryUnit').value = '';
            document.getElementById('entryRefLow').value = '';
            document.getElementById('entryRefHigh').value = '';
            setTodayDate();
        }

        function showMessage(text, type, tabId) {
            const messageDiv = document.getElementById(tabId + 'Message');
            if (messageDiv) {
                messageDiv.className = `message ${type}`;
                messageDiv.textContent = text;
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 4000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateDashboard();
            setTodayDate();
        });
    </script>
</body>
</html>
