<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Lab Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #root { min-height: 100vh; }
        #auth-overlay {
            position: fixed; inset: 0; z-index: 99999;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f0eb 50%, #f0ebe4 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .auth-card {
            background: linear-gradient(135deg, #ede9fe, #e8e0fc, #ddd6fe);
            border: 1px solid #c4b5fd;
            border-radius: 24px;
            padding: 48px 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(109,40,217,0.1), 0 8px 24px rgba(0,0,0,0.06);
        }
        .auth-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .auth-title {
            font-size: 22px; font-weight: 700; color: #1e1b4b;
            margin-bottom: 8px;
        }
        .auth-sub {
            font-size: 13px; color: #7c3aed;
            margin-bottom: 32px; opacity: 0.7;
        }
        .auth-input-wrap {
            position: relative; margin-bottom: 20px;
        }
        .auth-input {
            width: 100%; padding: 14px 18px;
            background: rgba(255,255,255,0.7);
            border: 1px solid #c4b5fd;
            border-radius: 12px;
            color: #1e1b4b; font-size: 18px; font-weight: 600;
            text-align: center; letter-spacing: 8px;
            outline: none; transition: border-color 0.2s;
        }
        .auth-input::placeholder {
            letter-spacing: 2px; font-weight: 400; font-size: 14px;
            color: #a78bfa;
        }
        .auth-input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }
        .auth-input.error {
            border-color: #ef4444;
            animation: shake 0.4s ease-in-out;
        }
        .auth-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; border-radius: 12px;
            color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.4);
        }
        .auth-btn:active { transform: translateY(0); }
        .auth-error {
            color: #dc2626; font-size: 13px; margin-top: 16px;
            min-height: 20px;
        }
        .auth-footer {
            margin-top: 24px; font-size: 11px;
            color: #a78bfa;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="auth-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>
        <div class="auth-title">Medical Lab Tracker</div>
        <div class="auth-sub">Enter passcode to access your data</div>
        <form id="auth-form" autocomplete="off">
            <div class="auth-input-wrap">
                <input id="auth-code" class="auth-input" type="password" inputmode="numeric"
                       placeholder="Passcode" maxlength="20" autofocus autocomplete="off"/>
            </div>
            <button type="submit" class="auth-btn">Unlock</button>
        </form>
        <div id="auth-error" class="auth-error"></div>
        <div class="auth-footer">AES-256-GCM encrypted</div>
    </div>
</div>

<script>
(function(){
    const form = document.getElementById('auth-form');
    const input = document.getElementById('auth-code');
    const errorEl = document.getElementById('auth-error');
    const overlay = document.getElementById('auth-overlay');

    // Prevent any DOM inspection from revealing content
    // Content only exists after successful decryption

    async function tryDecrypt(passcode) {
        const b64 = document.getElementById('encrypted-payload').textContent.trim();
        const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const salt = raw.slice(0, 16);
        const iv = raw.slice(16, 28);
        const tag = raw.slice(28, 44);
        const ciphertext = raw.slice(44);

        // PBKDF2 key derivation
        const keyMaterial = await crypto.subtle.importKey(
            'raw', new TextEncoder().encode(passcode), 'PBKDF2', false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            false, ['decrypt']
        );

        // AES-GCM: WebCrypto expects tag appended to ciphertext
        const combined = new Uint8Array(ciphertext.length + tag.length);
        combined.set(ciphertext);
        combined.set(tag, ciphertext.length);

        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv: iv }, key, combined
        );
        return JSON.parse(new TextDecoder().decode(decrypted));
    }

    async function loadApp(data) {
        // Remove encrypted payload from DOM
        document.getElementById('encrypted-payload').remove();

        // Load Babel standalone first
        const babel = document.createElement('script');
        babel.src = 'https://unpkg.com/@babel/standalone/babel.min.js';
        babel.onload = function() {
            // Create the JSX source block
            const jsxScript = document.createElement('script');
            jsxScript.type = 'text/plain';
            jsxScript.id = 'app-jsx';
            jsxScript.textContent = data.jsx;
            document.body.appendChild(jsxScript);

            // Create the module bootstrap script
            const modScript = document.createElement('script');
            modScript.type = 'module';
            modScript.textContent = data.module;
            document.body.appendChild(modScript);
        };
        document.head.appendChild(babel);

        // Fade out auth overlay
        overlay.style.animation = 'fadeOut 0.4s ease forwards';
        setTimeout(() => overlay.remove(), 400);
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const code = input.value.trim();
        if (!code) return;

        errorEl.textContent = '';
        input.classList.remove('error');

        try {
            const data = await tryDecrypt(code);
            await loadApp(data);
        } catch (err) {
            input.classList.add('error');
            errorEl.textContent = 'Incorrect passcode';
            input.value = '';
            input.focus();
            setTimeout(() => input.classList.remove('error'), 400);
        }
    });

    // Allow Enter key
    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
})();
</script>
